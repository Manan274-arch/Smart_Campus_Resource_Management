<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Campus — Login</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    /* ── Page-specific layout ── */
    body { background: var(--bg-dark); display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .auth-logo h1 { font-size: 1.6rem; color: var(--accent); margin: 0; }
    .auth-logo p  { color: var(--text-muted); font-size: 0.85rem; margin: 0.25rem 0 0; }

    .tab-row {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.75rem;
    }
    .tab-btn {
      flex: 1;
      padding: 0.6rem;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.95rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; color: var(--text-muted); font-size: 0.82rem; margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-group input,
    .form-group select { width: 100%; padding: 0.65rem 0.85rem; background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.95rem; box-sizing: border-box; transition: border-color 0.2s; }
    .form-group input:focus,
    .form-group select:focus { outline: none; border-color: var(--accent); }

    .btn-full { width: 100%; margin-top: 0.5rem; }
    .auth-error { color: var(--danger); font-size: 0.85rem; margin-top: 0.5rem; min-height: 1.2em; }
  </style>
</head>
<body>

<div class="auth-card">
  <div class="auth-logo">
    <h1>🏛 Smart Campus</h1>
    <p>Resource Management System</p>
  </div>

  <div class="tab-row">
    <button class="tab-btn active" onclick="switchTab('login')">Login</button>
    <button class="tab-btn" onclick="switchTab('signup')">Register</button>
  </div>

  <!-- LOGIN PANEL -->
  <div id="panel-login" class="tab-panel active">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@campus.edu" autocomplete="email" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <p class="auth-error" id="login-error"></p>
    <button class="btn btn-primary btn-full" id="btn-login" data-label="Login" onclick="doLogin()">Login</button>
  </div>

  <!-- SIGNUP PANEL -->
  <div id="panel-signup" class="tab-panel">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="reg-name" placeholder="Jane Smith" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="you@campus.edu" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="Min. 6 characters" />
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="reg-role">
        <option value="2">Student</option>
        <option value="3">Faculty</option>
      </select>
    </div>
    <p class="auth-error" id="reg-error"></p>
    <button class="btn btn-primary btn-full" id="btn-register" data-label="Create Account" onclick="doRegister()">Create Account</button>
  </div>
</div>

<div id="toast-container"></div>

<script>
  const API = "/api";

  // Check if already logged in
  if (localStorage.getItem("campus_token")) {
    window.location.href = "dashboard.html";
  }

  function switchTab(tab) {
    document.querySelectorAll(".tab-btn").forEach((b, i) => {
      b.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "signup"));
    });
    document.getElementById("panel-login").classList.toggle("active", tab === "login");
    document.getElementById("panel-signup").classList.toggle("active", tab === "signup");
  }

  async function doLogin() {
    const email    = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;
    const errEl    = document.getElementById("login-error");
    errEl.textContent = "";

    if (!email || !password) { errEl.textContent = "All fields required."; return; }

    const btn = document.getElementById("btn-login");
    btn.disabled = true; btn.textContent = "Logging in…";

    try {
      const res = await fetch(`${API}/users/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.detail || "Login failed."; return; }

      localStorage.setItem("campus_token", data.access_token);
      localStorage.setItem("campus_user", JSON.stringify({ user_id: data.user_id, role_id: data.role_id, email }));
      window.location.href = "dashboard.html";
    } catch(e) {
      errEl.textContent = "Network error.";
    } finally {
      btn.disabled = false; btn.textContent = "Login";
    }
  }

  async function doRegister() {
    const name     = document.getElementById("reg-name").value.trim();
    const email    = document.getElementById("reg-email").value.trim();
    const password = document.getElementById("reg-password").value;
    const role_id  = parseInt(document.getElementById("reg-role").value);
    const errEl    = document.getElementById("reg-error");
    errEl.textContent = "";

    if (!name || !email || !password) { errEl.textContent = "All fields required."; return; }
    if (password.length < 6)          { errEl.textContent = "Password must be at least 6 characters."; return; }

    const btn = document.getElementById("btn-register");
    btn.disabled = true; btn.textContent = "Creating account…";

    try {
      const res = await fetch(`${API}/users/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, password, role_id })
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.detail || "Registration failed."; return; }
      showToast("Account created! Please log in.", "success");
      switchTab("login");
      document.getElementById("login-email").value = email;
    } catch(e) {
      errEl.textContent = "Network error.";
    } finally {
      btn.disabled = false; btn.textContent = "Create Account";
    }
  }

  // Allow Enter key to submit
  document.addEventListener("keydown", e => {
    if (e.key !== "Enter") return;
    const active = document.querySelector(".tab-panel.active")?.id;
    if (active === "panel-login")  doLogin();
    if (active === "panel-signup") doRegister();
  });

  function showToast(msg, type = "info") {
    const c = document.getElementById("toast-container");
    const t = document.createElement("div");
    t.className = `toast toast-${type}`;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.classList.add("show"), 10);
    setTimeout(() => { t.classList.remove("show"); setTimeout(() => t.remove(), 300); }, 3500);
  }
</script>
</body>
</html>
